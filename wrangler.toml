name = "travel-planning-worker"
main = "apps/worker/src/index.ts"
account_id = "0cc97ad133a28f1909ff91ee52a02c3e"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[triggers]
crons = ["0 11 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "travel-planning-db"
database_id = "ddf61ec9-3099-4073-8ed6-279743679928"

